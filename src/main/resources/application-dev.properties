# ==============================================================================
# HMS — 개발 환경 (H2 in-memory)
# ==============================================================================
# 참고: documents 10_환경_설정_템플릿/application-dev.properties.example
# Redis 미사용 — 세션은 기본 메모리 저장. Redis 필요 시 의존성 추가 후 활성화.
# ==============================================================================

# ------------------------------------------------------------------------------
# 서버 설정
# ------------------------------------------------------------------------------
server.port=8080
server.servlet.session.timeout=60m
server.servlet.session.cookie.secure=false

# ------------------------------------------------------------------------------
# H2 Database (개발용)
# ------------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:hmsdb;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ------------------------------------------------------------------------------
# JPA / Hibernate
# ------------------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Hibernate 스키마 생성 후 sql_test.sql 실행
spring.jpa.defer-datasource-initialization=true

# ------------------------------------------------------------------------------
# 테스트 데이터 (sql_test.sql)
# ------------------------------------------------------------------------------
hms.init.use-sql=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:sql_test.sql

# ------------------------------------------------------------------------------
# Claude API (환경 변수 — .env 또는 run-dev.ps1)
# ------------------------------------------------------------------------------
claude.api.key=${CLAUDE_API_KEY:}
claude.api.model=claude-sonnet-4-6
claude.api.timeout-seconds=5

# ------------------------------------------------------------------------------
# LLM 서비스 (Python FastAPI)
# ------------------------------------------------------------------------------
llm.service.url=${LLM_SERVICE_URL:http://192.168.0.73:8000}
llm.service.timeout.connect=5000
llm.service.timeout.read=120000

# ------------------------------------------------------------------------------
# 로깅 (개발: 상세)
# ------------------------------------------------------------------------------
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.smartclinic.hms=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ------------------------------------------------------------------------------
# 에러 페이지 (개발: 상세 노출)
# ------------------------------------------------------------------------------
server.error.include-message=on_param
server.error.include-stacktrace=never
