# ==============================================================================
# HMS (Hospital Management System) — 공통 설정
# ==============================================================================
# 참고: proejct-team-alpha/documents 10_환경_설정_템플릿
#
# 프로필: dev (H2) | prod (MySQL+Redis, 의존성 추가 시)
# 실행: --spring.profiles.active=dev
# ==============================================================================

spring.application.name=hms

# ------------------------------------------------------------------------------
# 활성 프로필
# 로컬: spring.profiles.active=dev (기본값 유지)
# 배포: --spring.profiles.active=prod 으로 외부 지정할 것 (이 값을 직접 수정하지 말 것)
# ------------------------------------------------------------------------------
spring.profiles.active=dev

# ------------------------------------------------------------------------------
# 공통 서버 설정
# ------------------------------------------------------------------------------
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.force=true
spring.servlet.encoding.enabled=true
spring.web.error.whitelabel.enabled=false

# ------------------------------------------------------------------------------
# 공통 JPA 설정
# ------------------------------------------------------------------------------
spring.jpa.open-in-view=false
spring.data.redis.repositories.enabled=false

# ------------------------------------------------------------------------------
# 공통 Mustache 설정
# ------------------------------------------------------------------------------
spring.mustache.suffix=.mustache
spring.mustache.servlet.expose-request-attributes=true
spring.mustache.servlet.allow-request-override=true

# ------------------------------------------------------------------------------
# 공통 세션 쿠키 보안
# ------------------------------------------------------------------------------
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax

# ------------------------------------------------------------------------------
# 공통 파일 업로드 제한
# ------------------------------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
spring.servlet.multipart.enabled=true
# ------------------------------------------------------------------------------
# 로깅 — logback-spring.xml 에서 관리 (프로필별 콘솔/파일/에러 분리)
# ------------------------------------------------------------------------------
spring.output.ansi.enabled=ALWAYS

# ------------------------------------------------------------------------------
# 운영 프로필 전용 설정
# ------------------------------------------------------------------------------
# 개발 환경(dev, H2)은 기본 메모리 세션을 사용하고,
# 운영 환경(prod)에서만 Redis 세션 저장소를 활성화한다.
# ------------------------------------------------------------------------------
#---
spring.config.activate.on-profile=prod
spring.cache.type=redis
spring.session.store-type=redis
spring.session.redis.namespace=hms:session
server.servlet.session.timeout=30m
