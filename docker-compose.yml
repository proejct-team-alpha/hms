services:
  mysql:
    image: mysql:8.0
    container_name: hms-db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: hms_db
      MYSQL_USER: hms_admin
      MYSQL_PASSWORD: hms_password
    ports:
      - "0.0.0.0:3306:3306"
    volumes:
      - hms_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: hms-redis
    ports:
      - "0.0.0.0:6379:6379"
    volumes:
      - hms_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:1.5.4
    container_name: hms-chromadb
    ports:
      - "0.0.0.0:8100:8000"
    volumes:
      - hms_chroma_data:/chroma/chroma
    environment:
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  python-llm:
    # python-llm/ 디렉토리를 spring-python-llm-exam-mng/python-llm/ 에서 수동 복사 필요
    # cp -r ../spring-python-llm-exam-mng/python-llm ./python-llm
    build:
      context: ./python-llm
      dockerfile: Dockerfile
    container_name: hms-python
    ports:
      - "0.0.0.0:8000:8000"
    environment:
      - LLM_BACKEND=vllm
      - VLLM_BASE_URL=http://192.168.0.22:9000
      - VLLM_MODEL=qwen2.5-3b
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - MYSQL_HOST=mysql
      - MYSQL_PORT=3306
      - MYSQL_USER=root
      - MYSQL_PASSWORD=rootpassword
      - MYSQL_DB=hms_db
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - USE_VECTOR_SEARCH=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy
      chromadb:
        condition: service_healthy

  spring-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hms-spring
    expose:
      - "8080"
    volumes:
      - ./logs/spring:/opt/hms/logs
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/hms_db
      - SPRING_DATASOURCE_USERNAME=hms_admin
      - SPRING_DATASOURCE_PASSWORD=hms_password
      - LLM_SERVICE_URL=http://python-llm:8000
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - CLAUDE_API_KEY=${CLAUDE_API_KEY:-}
      - LOG_PATH=/opt/hms/logs
      - HMS_CORS_ALLOWED_ORIGINS=https://192.168.0.22,https://localhost
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      python-llm:
        condition: service_started

  nginx:
    image: nginx:alpine
    container_name: hms-nginx
    ports:
      - "0.0.0.0:443:443"
      - "0.0.0.0:80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - spring-app

volumes:
  hms_mysql_data:
  hms_chroma_data:
  hms_redis_data:
